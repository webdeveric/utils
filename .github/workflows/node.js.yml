name: Node.js CI

on: [push]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

permissions:
  contents: read # for checkout

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-24.04
    steps:
      - name: Print Runner Specs
        run: |
          lscpu
          cat /proc/meminfo

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Installing dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --ignore-registry-errors --audit-level=moderate --prod

      - name: Verify registry signatures for installed packages
        run: pnpm audit signatures

      - name: Linting last commit message
        if: github.event_name == 'push'
        run: pnpm exec commitlint --last --verbose

      - name: Linting
        run: pnpm lint

      - name: Type checking
        run: pnpm typecheck

      - name: Testing
        run: pnpm coverage

      - name: Building
        run: pnpm build
